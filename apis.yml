aid: keep
name: Keep
description: >-
  Keep is an open-source AIOps and alert management platform that unifies
  alerts from any monitoring tool, providing deduplication, correlation,
  enrichment, and workflow automation across observability, incident
  response, ticketing, and CMDB systems. The Keep REST API enables
  programmatic access to alerts, incidents, workflows, providers, and
  integrations with FastAPI-generated OpenAPI documentation.
