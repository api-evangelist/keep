openapi: 3.0.2
info:
  title: Keep actions alerts API
  description: Rest API powering https://platform.keephq.dev and friends 🏄‍♀️
  version: 0.24.5
tags:
- name: alerts
paths:
  /alerts:
    get:
      tags:
      - alerts
      summary: Get All Alerts
      description: Get last alerts occurrence
      operationId: get_all_alerts_alerts_get
      parameters:
      - required: false
        schema:
          type: integer
          title: Limit
          default: 1000
        name: limit
        in: query
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/AlertDto'
                type: array
                title: Response Get All Alerts Alerts Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - API Key: []
      - HTTPBasic: []
      - OAuth2PasswordBearer: []
    delete:
      tags:
      - alerts
      summary: Delete Alert
      description: Delete alert by finerprint and last received time
      operationId: delete_alert_alerts_delete
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRequestBody'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Delete Alert Alerts Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - API Key: []
      - HTTPBasic: []
      - OAuth2PasswordBearer: []
