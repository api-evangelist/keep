      - API Key: []
      - HTTPBasic: []
      - OAuth2PasswordBearer: []
components:
  schemas:
    DeleteRequestBody:
      properties:
        fingerprint:
          type: string
          title: Fingerprint
        lastReceived:
          type: string
          title: Lastreceived
        restore:
          type: boolean
          title: Restore
          default: false
      type: object
      required:
      - fingerprint
      - lastReceived
      title: DeleteRequestBody
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    WorkflowToAlertExecutionDTO:
      properties:
        workflow_id:
          type: string
          title: Workflow Id
        workflow_execution_id:
          type: string
          title: Workflow Execution Id
        alert_fingerprint:
          type: string
          title: Alert Fingerprint
        workflow_status:
          type: string
          title: Workflow Status
        workflow_started:
          type: string
          format: date-time
          title: Workflow Started
      type: object
      required:
      - workflow_id
      - workflow_execution_id
      - alert_fingerprint
      - workflow_status
      - workflow_started
      title: WorkflowToAlertExecutionDTO
    WorkflowExecutionsPaginatedResultsDto:
      properties:
        limit:
          type: integer
          title: Limit
          default: 25
        offset:
          type: integer
          title: Offset
          default: 0
        count:
          type: integer
          title: Count
        items:
          items:
            $ref: '#/components/schemas/WorkflowExecutionDTO'
          type: array
          title: Items
        passCount:
          type: integer
          title: Passcount
          default: 0
        avgDuration:
          type: number
          title: Avgduration
          default: 0
        workflow:
          $ref: '#/components/schemas/WorkflowDTO'
        failCount:
          type: integer
          title: Failcount
          default: 0
